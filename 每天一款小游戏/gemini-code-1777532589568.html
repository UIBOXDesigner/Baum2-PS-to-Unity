const rollRarity = () => {
  const roll = Math.random() * 100;
  if (roll < 50) return 'N';
  if (roll < 80) return 'R';
  if (roll < 95) return 'SR';
  if (roll < 99) return 'SSR';
  return 'UR';
};

const sanitizeEmployee = (e) => {
  const traitKeys = Object.keys(TRAITS);
  const validRarity = RARITY_MAP[e.rarityKey] ? e.rarityKey : 'N';
  return {
    ...e,
    name: e.name || `神秘打工人_${e.id ? e.id.substring(0, 4) : 'x'}`,
    skill: Number(e.skill) || getRandomInt(40, 80),
    cost: Number(e.cost) || 200,
    salary: Number(e.salary) || Math.max(5, Math.floor((Number(e.cost) || 200) / 10)),
    specialty: e.specialty || '无',
    loyalty: Number(e.loyalty) || 100,
    rarityKey: validRarity,
    trait: e.trait || traitKeys[getRandomInt(0, traitKeys.length - 1)],
    marketRumor: e.marketRumor || "这家伙是个谜，没人知道他的底细。"
  };
};

const sanitizeProject = (p) => {
  return {

    difficulty: Number(p.difficulty) || 80,

    desc: p.desc || "由于电报信号受损，详情缺失，但雇主给得很多。"
  };

const generateEmployee = (valuation) => {
  const rarityKey = rollRarity();
  const maxCap = RARITY_MAP[rarityKey].maxSkill;
  let baseSkill = getRandomInt(10 + Math.floor(valuation / 10), 30 + Math.floor(valuation / 5));
  baseSkill = Math.min(baseSkill, maxCap);
  
  const traitKeys = Object.keys(TRAITS);
  const trait = traitKeys[getRandomInt(0, traitKeys.length - 1)];
  
  let cost = baseSkill * getRandomInt(2, 4);
  let salary = Math.max(1, Math.floor(cost / 10));
  if (trait === 'nepotism') salary = Math.floor(salary * 1.5); 

  return {
    id: generateId(),
    name: `${NAMES_FIRST[getRandomInt(0, NAMES_FIRST.length - 1)]} ${NAMES_LAST[getRandomInt(0, NAMES_LAST.length - 1)]}`,
    skill: Math.max(1, baseSkill),
    rarityKey: rarityKey,
    specialty: PROJECT_VERBS[getRandomInt(0, PROJECT_VERBS.length - 1)],
    cost: cost,
    salary: salary,
    status: 'idle', 
    restDays: 0,
    trainingDays: 0,
    projectId: null,
    expeditionId: null,
    expeditionEndTime: null,
    isAppraised: false,
    loyalty: getRandomInt(80, 100),
    equipment: null,
    marketRumor: RUMORS[rarityKey][getRandomInt(0, RUMORS[rarityKey].length - 1)],
    trait: trait, 
  };
};

    assignedTo: null,

};

const formatTime = (ms) => {
  if (ms <= 0) return "00:00:00";
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
};

    setIsRacing(true);
    setLastBetResult(null);
    setCash(c => c - betAmount); 

    const horse = HORSES.find(h => h.id === selectedHorse);
    const roll = Math.random();
    const isWin = roll <= horse.chance;

    let winningHorseId = selectedHorse;
    if (!isWin) {
       const otherHorses = HORSES.filter(h => h.id !== selectedHorse);
       winningHorseId = otherHorses[Math.floor(Math.random() * otherHorses.length)].id;
    }

    let currentProgress = { h1: 0, h2: 0, h3: 0, h4: 0 };
    setRaceProgress(currentProgress);

    if (raceIntervalRef.current) clearInterval(raceIntervalRef.current);

    raceIntervalRef.current = setInterval(() => {
       let raceFinished = false;
       currentProgress = { ...currentProgress };

       Object.keys(currentProgress).forEach(id => {
          const boost = id === winningHorseId ? (Math.random() * 2 + 1.2) : (Math.random() * 1.8 + 0.3);
          currentProgress[id] += boost;
          
          if (currentProgress[id] >= 90 && id !== winningHorseId && currentProgress[winningHorseId] < 100) {
             currentProgress[id] = 90 + Math.random() * 2; 
          }
          
          if (currentProgress[id] >= 100) {
             currentProgress[id] = 100;
             if (id === winningHorseId) raceFinished = true;
          }
       });

       setRaceProgress(currentProgress);

       if (raceFinished) {
          clearInterval(raceIntervalRef.current);
          setTimeout(() => {
             setIsRacing(false);
             if (isWin) {
                const winnings = Math.floor(betAmount * horse.multiplier);

                addLog(`🎲 【血本无归】押注 "${horse.name}" 失败，亏损 $${betAmount}。`);

      addLog(`🚚 花费 $${nextLevel.cost} 成功搬迁至【${nextLevel.name}】！`);
    }
    else showError(`资金不足以搬迁至 ${nextLevel.name}！`);
  };

  const getWinChance = (emp, proj) => {
    if (!emp || !proj) return 0;
    let empSkill = emp.skill + (emp.equipment === 'mech_gun' ? 15 : 0);
    const effectiveSkill = empSkill + (upgrades.revolver.level * 5);
    let winChance = effectiveSkill / (effectiveSkill + proj.difficulty);
    if (emp.specialty && proj.name.includes(emp.specialty)) winChance += 0.20;
    if (emp.trait === 'veteran') winChance -= 0.10; 
    const safeCampLevel = Number(campLevel) || 0;
    winChance += gossipBuff + (CAMP_LEVELS[safeCampLevel]?.buffRate || 0);
    return Math.max(0.1, Math.min(0.95, winChance));
  };

  const nextDay = () => {
    let dailyLog = []; let cashChange = 0; let valChange = 0; let reclaimedGears = [];
    let currentCash = cash; 
    let rptProj = 0; let rptAsset = 0; let rptPayroll = 0; let rptLoan = 0; let rptEvent = 0; let rptEventName = '';

    Object.keys(assets).forEach(assetKey => {
      if (assets[assetKey]) {
        cashChange += ASSETS_DATA[assetKey].dailyCash; valChange += ASSETS_DATA[assetKey].dailyVal;
        rptAsset += ASSETS_DATA[assetKey].dailyCash;
        dailyLog.push(`🎩 [不动产] ${ASSETS_DATA[assetKey].name} 收益: +$${ASSETS_DATA[assetKey].dailyCash}。`);
      }
    });
    currentCash += cashChange;

    const processedEmployees = employees.map(emp => {
      if (emp.status === 'expedition' || emp.status === 'internal') return emp;
      
      if (emp.status === 'resting') {
        const recoverySpeed = roles.doctor ? 2 : 1; 
        const remaining = emp.restDays - recoverySpeed;
        if (remaining <= 0) { dailyLog.push(`"${emp.name}" 伤愈归队！`); return { ...emp, status: 'idle', restDays: 0 }; }
        return { ...emp, restDays: remaining };
      }
      if (emp.status === 'training') {
        const remaining = (emp.trainingDays || 0) - 1;
        if (remaining <= 0) {
          const newSkill = Math.min(RARITY_MAP[emp.rarityKey].maxSkill, emp.skill + getRandomInt(3, 8));
          dailyLog.push(`🎓 "${emp.name}" 进修结束，战力变为 ${newSkill}！`); return { ...emp, status: 'idle', trainingDays: 0, skill: newSkill };
        }
        return { ...emp, trainingDays: remaining };
      }
      if (emp.status === 'working') {
        const proj = projects.find(p => p.id === emp.projectId);
        if (!proj) return { ...emp, status: 'idle', projectId: null };
        const winChance = getWinChance(emp, proj);
        
        if (Math.random() <= winChance) {
          let reward = proj.reward;
          if (emp.trait === 'sales_champ') reward = Math.floor(reward * 1.2); 
          cashChange += reward; currentCash += reward; valChange += Math.floor(proj.difficulty / 2) + (upgrades.marketing.level * 2);
          rptProj += reward; 
          dailyLog.push(`🟢 "${emp.name}" 完成了 "${proj.name}"，赚取 $${reward}！`);
          return { ...emp, status: 'idle', projectId: null, skill: Math.min(100, emp.skill + 1) };
        } else {
          valChange -= Math.floor(proj.difficulty / 3);
          let deathChance = 0.15;
          if (emp.trait === 'workaholic') deathChance = 0.25; 
          
          let failStatus = { ...emp };
          if (Math.random() < deathChance) {
            if (emp.equipment === 'plaid_shirt') {
              dailyLog.push(`🛡️ "${emp.name}" 的防弹衣碎裂。转为重伤。`); 
              failStatus = { ...failStatus, status: 'resting', restDays: 3, projectId: null, equipment: null };
            } else {
              if (emp.equipment) reclaimedGears.push(emp.equipment);
              dailyLog.push(`💀 "${emp.name}" 在任务中被击毙！`); 
              failStatus = { ...failStatus, status: 'dead', projectId: null, equipment: null };
            }
          } else {
            const restTime = Math.max(1, 4 - upgrades.coffee.level);
            dailyLog.push(`🔴 "${emp.name}" 受重伤，休养 ${restTime} 天！`); 
            failStatus = { ...failStatus, status: 'resting', restDays: restTime, projectId: null };
          }
          if (emp.trait === 'fragile' && failStatus.status !== 'dead') {
             failStatus.loyalty = Math.max(0, (failStatus.loyalty || 100) - 20);
             dailyLog.push(`💔 【玻璃心】"${emp.name}" 任务受挫，忠诚度暴跌 20点！`);
          }
          return failStatus;
        }
      }
      return emp;
    });

    let runawaysThisDay = 0; let finalEmployeesWithLoyalty = []; let dailyPayroll = 0;
    
    processedEmployees.forEach(emp => {
      if (emp.status === 'dead') { finalEmployeesWithLoyalty.push(emp); return; }
      dailyPayroll += (emp.salary || Math.floor(emp.cost / 10)); 
      
      let newLoyalty = emp.loyalty ?? 100;
      if (emp.status !== 'expedition' && emp.status !== 'internal') {
         let baseDrop = emp.equipment === 'ergo_saddle' ? 0 : getRandomInt(1, 4);
         if (emp.trait === 'veteran') baseDrop = 0; 
         if (emp.trait === 'workaholic') baseDrop = -2; 
         newLoyalty -= baseDrop;
         if (emp.status === 'resting') newLoyalty -= 10;
         if (currentCash < 200) newLoyalty -= 8;
      }
      newLoyalty = Math.min(100, newLoyalty);

      if (newLoyalty <= 0) {
        runawaysThisDay++; dailyLog.push(`🏃 "${emp.name}" 提桶跑路了！`);
        if (emp.equipment) reclaimedGears.push(emp.equipment); 
        if (emp.status === 'internal') {
           const roleKey = Object.keys(roles).find(k => roles[k] === emp.id);
           if (roleKey) setRoles(prev => ({ ...prev, [roleKey]: null }));
        }
      } else finalEmployeesWithLoyalty.push({ ...emp, loyalty: newLoyalty });
    });

    if (runawaysThisDay > 0) setStats(s => ({ ...s, runaway: s.runaway + runawaysThisDay }));
    cashChange -= dailyPayroll; currentCash -= dailyPayroll;
    rptPayroll = dailyPayroll;
    if (dailyPayroll > 0) dailyLog.push(`💸 支付了全员日薪 $${dailyPayroll}。`);

    if (loan.active && (day + 1) === loan.dueDay) {
      if (currentCash >= loan.repay) {
        cashChange -= loan.repay; currentCash -= loan.repay;

        dailyLog.push(`🏦 财团扣除了 $${loan.repay} 贷款。`); setLoan(prev => ({ ...prev, active: false, dueDay: null }));
      } else {
        rptLoan -= currentCash;
        cashChange -= currentCash; 
        dailyLog.push(`🩸 【暴力催收】平克顿查封了所有资金！`);
        let bestEmp = null; let bestSkill = -1;
        finalEmployeesWithLoyalty.forEach(e => { if (e.status !== 'dead' && e.skill > bestSkill) { bestSkill = e.skill; bestEmp = e; } });
        if (bestEmp) {

    if (reclaimedGears.length > 0) setInventory(prev => { const next = { ...prev }; reclaimedGears.forEach(g => next[g] = (next[g] || 0) + 1); return next; });

    let finalEmployees = [...finalEmployeesWithLoyalty]; let triggeredEvent = null;

         rptEventName = `安保拦截: ${triggeredEvent.title}`;

      } else {
         const prevCashChange = cashChange;
         const eventStates = { cashChange, valChange, finalEmployees };
         triggeredEvent.apply(eventStates, RARITY_MAP);
         cashChange = eventStates.cashChange; valChange = eventStates.valChange; finalEmployees = eventStates.finalEmployees;
         rptEvent = cashChange - prevCashChange;
         rptEventName = triggeredEvent.title;
         dailyLog.push(`🎲 ${triggeredEvent.title}: ${triggeredEvent.desc}`);
      }
    }

    setDailyReport({ day: day, proj: rptProj, asset: rptAsset, payroll: rptPayroll, loan: rptLoan, eventName: rptEventName, eventImpact: rptEvent, net: cashChange });

    setEmployees(finalEmployees); setCash(c => c + cashChange); setValuation(v => Math.max(0, v + valChange));
    setMarketEmployees(Array.from({ length: 3 }).map(() => generateEmployee(valuation + valChange)));
    setProjects(Array.from({ length: 5 }).map(() => generateProject(valuation + valChange)));
    setDay(d => d + 1);
    if (gossipBuff > 0) { setGossipBuff(0); setGossipCost(1); }
    if (dailyLog.length === 0) dailyLog.push("平安无事的一天。");
    setLogs(prev => [...dailyLog.map(msg => `[第${day+1}天] ${msg}`), ...prev].slice(0, 50));
    if (triggeredEvent && !rptEventName.includes('安保拦截')) setRandomEvent(triggeredEvent);
    if ((cash + cashChange) >= 10000 && (valuation + valChange) >= 500) alert("🎉 恭喜上市通关！");

               <div className="flex justify-between items-center mb-3">
                 <h3 className="text-amber-400 font-bold text-lg">达奇的创业指导</h3>
                 <span className="text-[10px] font-mono bg-stone-800 text-stone-400 px-2 py-0.5 rounded-full border border-stone-600">{tutorialStep}/5</span>
               </div>
               {tutorialStep === 1 && <p className="text-sm text-stone-300 leading-relaxed">欢迎来到硅谷！我是达奇。我们现在一穷二白，但我们需要更多的 MONEY！准备好学习怎么当资本家了吗？</p>}
               {tutorialStep === 2 && <p className="text-sm text-stone-300 leading-relaxed">第一步：在<strong className="text-amber-500">【人才市场】</strong>，花钱给这些求职者发 Offer，<strong className="text-green-400">招募</strong>一个小弟。</p>}
               {tutorialStep === 3 && <p className="text-sm text-stone-300 leading-relaxed">第二步：光吃饭不干活可不行！在<strong className="text-amber-500">【业务大厅】</strong>点击一个项目的<strong className="text-green-400">派遣员工</strong>，把小弟派出去！</p>}
               {tutorialStep === 4 && <p className="text-sm text-stone-300 leading-relaxed">第三步：万事俱备。点击顶部红色的<strong className="text-red-400">【结束今天】</strong>按钮，进入明天看结算结果！</p>}
               {tutorialStep === 5 && <p className="text-sm text-stone-300 leading-relaxed">完美！你已经掌握了精髓。去<strong className="text-cyan-400">【营地基建】</strong>买道具、搞投资吧。记住，千万别让资金变成负数！</p>}
               <div className="mt-5 text-right flex justify-between items-center">
                 {tutorialStep > 1 && tutorialStep < 5 ? (
                    <button onClick={() => setTutorialStep(-1)} className="text-stone-500 hover:text-stone-300 text-xs underline transition">跳过教程</button>
                 ) : <div></div>}
                 {tutorialStep === 1 && <button onClick={() => { setTutorialStep(2); setCurrentTab('recruit'); }} className="bg-amber-600 hover:bg-amber-500 text-stone-900 px-5 py-2 rounded-xl font-bold text-sm shadow-lg transition transform hover:scale-105">开始打工</button>}
                 {tutorialStep === 5 && <button onClick={() => setTutorialStep(-1)} className="bg-amber-600 hover:bg-amber-500 text-stone-900 px-5 py-2 rounded-xl font-bold text-sm shadow-lg transition transform hover:scale-105">我已出师</button>}
               </div>
            </div>
          </div>
        </div>
      )}

      {offlineReport && (
        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4 animate-fade-in backdrop-blur-md">
          <div className="bg-stone-900 border-2 border-green-800 rounded-2xl max-w-md w-full p-8 text-center shadow-[0_0_50px_rgba(22,163,74,0.2)]">
             <div className="text-6xl mb-4">🌙</div>
             <h2 className="text-3xl font-bold text-green-400 mb-2">欢迎回来，CEO！</h2>
             <p className="text-stone-400 mb-6 text-sm">在您离线的 <span className="text-white font-bold">{offlineReport.hours}</span> 小时里，您的产业依然在自动运转，并为您赚取了丰厚的被动收益：</p>
             <div className="bg-stone-950 p-6 rounded-xl border border-stone-800 mb-8 space-y-4">
                {offlineReport.cash > 0 && <div className="flex justify-between items-center"><span className="text-stone-500 text-lg">现金流入</span><span className="font-mono text-green-400 font-bold text-xl">+$ {offlineReport.cash}</span></div>}
                {offlineReport.val > 0 && <div className="flex justify-between items-center"><span className="text-stone-500 text-lg">估值增长</span><span className="font-mono text-yellow-400 font-bold text-xl">+⭐ {offlineReport.val}</span></div>}
             </div>
             <button onClick={() => setOfflineReport(null)} className="w-full bg-green-800 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transition text-lg">领取收益并开始工作</button>
          </div>
        </div>
      )}

      {assigningProject && (
        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[70] p-4 animate-fade-in backdrop-blur-sm">
          <div className="bg-stone-900 border border-stone-700 rounded-2xl max-w-3xl w-full flex flex-col shadow-2xl max-h-[85vh] overflow-hidden">
             <div className="p-6 border-b border-stone-800 bg-stone-950 flex justify-between items-start">
                <div>
                  <div className="text-xs text-stone-500 uppercase tracking-wider mb-2">正在分配人员</div>
                  <h3 className="text-2xl font-bold text-stone-200">{assigningProject.isExpedition ? '🛫 ' : ''}{assigningProject.name}</h3>
                  {assigningProject.isExpedition ? (
                    <div className="text-sm text-cyan-400 mt-2 flex gap-4 bg-cyan-950/20 w-fit px-3 py-1.5 rounded-lg border border-cyan-900/30">
                      <span>要求战力: <span className="font-bold">{assigningProject.reqSkill}</span></span>
                      <span>耗时: <span className="font-bold">{assigningProject.timeDesc}</span></span>
                    </div>
                  ) : (
                    <div className="text-sm text-stone-400 mt-2 flex gap-4 bg-stone-800 w-fit px-3 py-1.5 rounded-lg border border-stone-700">
                       <span>难度: <span className="text-white font-bold">{assigningProject.difficulty}</span></span>
                       <span className="text-green-400">报酬: <span className="font-bold">${assigningProject.reward}</span></span>
                    </div>
                  )}
                </div>
                <button onClick={() => setAssigningProject(null)} className="text-stone-500 hover:text-white p-2 text-3xl leading-none">&times;</button>
             </div>
             <div className="p-6 overflow-y-auto custom-scrollbar flex-1 bg-stone-900 space-y-3">
                {employees.filter(e => e.status === 'idle').map(emp => {
                   let canDispatch = true; let chanceDisplay = null;
                   if (assigningProject.isExpedition) {
                      const effSkill = emp.skill + (emp.equipment === 'mech_gun' ? 15 : 0);
                      if (effSkill < assigningProject.reqSkill) canDispatch = false;
                   } else {
                      const chance = getWinChance(emp, assigningProject);
                      chanceDisplay = <div className={`font-mono font-bold text-xl ${chance > 0.7 ? 'text-green-400' : chance > 0.4 ? 'text-yellow-400' : 'text-red-500'}`}>{(chance * 100).toFixed(0)}%</div>;
                   }
                   return (
                     <div key={emp.id} onClick={() => { if(canDispatch) assigningProject.isExpedition ? handleAssignExpedition(emp.id, assigningProject.id) : handleAssignProject(emp.id, assigningProject.id); }} className={`group flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 p-5 bg-stone-800 rounded-xl border ${canDispatch ? 'border-stone-700 hover:border-amber-500 cursor-pointer shadow-md' : 'border-stone-800 opacity-50 cursor-not-allowed'} transition-all`}>
                        <div>
                           <div className="font-bold text-stone-200 text-xl flex items-center gap-2 mb-1">{emp.name} {emp.specialty && !assigningProject.isExpedition && assigningProject.name.includes(emp.specialty) && <span className="text-xs bg-cyan-900/50 text-cyan-400 px-2 py-0.5 rounded border border-cyan-800">特长对口</span>}</div>
                           <div className="text-sm text-stone-400">当前战力: <span className="font-mono text-stone-200">{emp.skill}</span> {emp.equipment==='mech_gun'&&<span className="text-indigo-400 font-bold">(+15 装备加成)</span>}</div>
                        </div>
                        <div className="flex items-center gap-6 w-full sm:w-auto justify-between sm:justify-end border-t border-stone-700 pt-3 sm:border-t-0 sm:pt-0">
                           {assigningProject.isExpedition ? (
                              !canDispatch && <div className="text-red-500 text-sm font-bold bg-red-950/30 px-3 py-1 rounded">战力不达标</div>
                           ) : <div className="text-right flex items-center gap-3"><div className="text-xs text-stone-500 uppercase tracking-wider">预计胜率</div>{chanceDisplay}</div>}
                           {canDispatch && <div className={`px-6 py-3 rounded-xl text-sm font-bold transition shadow-sm ${assigningProject.isExpedition ? 'bg-cyan-900/30 text-cyan-300 border border-cyan-800/50 group-hover:bg-cyan-600 group-hover:text-stone-900' : 'bg-stone-700 text-stone-300 group-hover:bg-amber-600 group-hover:text-stone-900'}`}>{assigningProject.isExpedition ? '外派远征' : '指派执行'}</div>}
                        </div>
                     </div>
                   );
                })}
                {employees.filter(e => e.status === 'idle').length === 0 && <div className="text-center py-12 text-stone-500 border-2 border-dashed border-stone-700 rounded-xl text-lg">当前没有处于【摸鱼中】的空闲员工。</div>}
             </div>
          </div>
        </div>
      )}

      {showSettings && (
        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[60] p-4 animate-fade-in backdrop-blur-sm">
          <div className="bg-stone-900 border border-stone-700 rounded-2xl max-w-sm w-full p-6 shadow-2xl">
            <div className="flex justify-between items-center mb-6 pb-4 border-b border-stone-800"><h2 className="text-xl font-bold text-stone-200">⚙️ 系统设置</h2><button onClick={() => setShowSettings(false)} className="text-stone-500 hover:text-white text-2xl">&times;</button></div>
            <div className="space-y-3">
              <button onClick={() => { saveGame(); setShowSettings(false); }} className="w-full bg-stone-800 hover:bg-stone-700 text-stone-200 py-3 rounded-xl border border-stone-700 transition font-bold">💾 手动存档</button>
              <button onClick={() => { if(loadGame()) setShowSettings(false); }} className="w-full bg-stone-800 hover:bg-stone-700 text-stone-200 py-3 rounded-xl border border-stone-700 transition font-bold">📂 读取存档</button>
              <button onClick={() => { clearSave(); setShowSettings(false); }} className="w-full bg-red-950/30 hover:bg-red-900/50 text-red-400 py-3 rounded-xl border border-red-900/50 transition mt-6 font-bold">🗑️ 删档重开</button>
            </div>
          </div>
        </div>
      )}

      {isBankrupt && (
        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[90] p-4 animate-fade-in backdrop-blur-md">
          <div className="bg-stone-900 border border-red-900 rounded-2xl max-w-md w-full p-8 flex flex-col items-center shadow-[0_0_50px_rgba(185,28,28,0.2)] text-center"><div className="text-6xl mb-4">📉</div><h2 className="text-3xl font-bold text-red-500 mb-2">破产清算</h2><p className="text-stone-400 mb-8">资金链断裂 (${cash.toFixed(0)})。员工跑路，公司被查封。</p><button onClick={restartGame} className="bg-red-800 hover:bg-red-700 text-white font-bold py-3 px-10 rounded-xl shadow-lg w-full">🔄 重新创业</button></div>
        </div>
      )}

      {randomEvent && (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-[80] p-4 animate-fade-in backdrop-blur-sm">
          <div className={`border rounded-2xl max-w-sm w-full p-8 flex flex-col items-center shadow-2xl text-center bg-stone-900 ${randomEvent.type === 'good' ? 'border-green-800/50 shadow-[0_0_30px_rgba(22,163,74,0.2)]' : 'border-red-800/50 shadow-[0_0_30px_rgba(220,38,38,0.2)]'}`}><div className="text-6xl mb-4 animate-bounce">{randomEvent.icon}</div><h2 className={`text-2xl font-bold mb-4 ${randomEvent.type === 'good' ? 'text-green-400' : 'text-red-400'}`}>{randomEvent.title}</h2><p className="text-stone-300 mb-8">{randomEvent.desc}</p><button onClick={() => setRandomEvent(null)} className="bg-stone-800 hover:bg-stone-700 text-white font-bold py-3 px-10 rounded-xl border border-stone-700 w-full transition">确认</button></div>
        </div>
      )}

      {showUpdateLog && (
        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[60] p-4 animate-fade-in backdrop-blur-sm">
          <div className="bg-stone-900 border border-stone-700 rounded-2xl max-w-2xl w-full max-h-[85vh] flex flex-col"><div className="flex justify-between items-center p-6 border-b border-stone-800"><h2 className="text-xl font-bold text-stone-200">📢 版本更新</h2><button onClick={() => setShowUpdateLog(false)} className="text-stone-500 hover:text-white text-2xl">&times;</button></div><div className="p-6 overflow-y-auto custom-scrollbar text-stone-300 space-y-6">{VERSION_HISTORY.map((ver, idx) => (<div key={ver.version} className={`relative ${idx === 0 ? 'bg-stone-800 p-5 rounded-xl border border-stone-700 shadow-md' : 'border-l-2 border-stone-700 pl-5 py-2'}`}>{idx === 0 && <div className="absolute top-0 right-0 bg-blue-600/20 text-blue-400 text-[10px] px-3 py-1 rounded-bl-lg rounded-tr-xl font-bold uppercase tracking-wider">最新版本</div>}<h3 className={`text-xl font-bold mb-3 flex items-center gap-3 ${idx === 0 ? 'text-stone-200' : 'text-stone-400'}`}>{ver.version} <span className="text-sm text-stone-500 font-normal">{ver.title}</span></h3><ul className="list-disc pl-5 space-y-1.5 text-sm text-stone-400">{ver.features.map((f, i) => <li key={i} className="leading-relaxed">{f}</li>)}</ul></div>))}</div></div>
        </div>
      )}

      {showAchievements && (
        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[60] p-4 animate-fade-in backdrop-blur-sm">
          <div className="bg-stone-900 border border-stone-700 rounded-2xl max-w-4xl w-full max-h-[85vh] flex flex-col"><div className="flex justify-between items-center p-6 border-b border-stone-800"><h2 className="text-xl font-bold text-yellow-500">🏆 帮派成就室 ({unlockedAchievements.length} / {ACHIEVEMENTS.length})</h2><button onClick={() => setShowAchievements(false)} className="text-stone-500 hover:text-white text-2xl">&times;</button></div><div className="p-6 overflow-y-auto custom-scrollbar grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">{ACHIEVEMENTS.map(ach => { const isUnlocked = unlockedAchievements.includes(ach.id); return (<div key={ach.id} className={`flex flex-col gap-3 p-5 rounded-xl border transition-all ${isUnlocked ? 'bg-yellow-950/10 border-yellow-700/50 shadow-sm' : 'bg-stone-900 border-stone-800 opacity-50 grayscale'}`}><div className="text-4xl">{ach.icon}</div><div><div className={`font-bold text-lg mb-1 ${isUnlocked ? 'text-yellow-400' : 'text-stone-400'}`}>{ach.name}</div><div className="text-xs text-stone-500 leading-relaxed">{ach.desc}</div></div></div>); })}</div></div>
        </div>
      )}

      {showManual && (
        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[60] p-4 animate-fade-in backdrop-blur-sm">
          <div className="bg-stone-900 border border-stone-700 rounded-2xl max-w-3xl w-full max-h-[85vh] flex flex-col shadow-2xl">
            <div className="flex justify-between items-center p-6 border-b border-stone-800"><h2 className="text-xl font-bold text-amber-500">📖 员工手册</h2><button onClick={() => setShowManual(false)} className="text-stone-500 hover:text-white text-2xl leading-none">&times;</button></div>
            <div className="p-6 overflow-y-auto custom-scrollbar text-sm text-stone-300 space-y-6">
              <p className="italic text-stone-400 bg-stone-800 p-4 rounded-xl">本手册指导你如何在这个残酷的狂野西部生存并实现最终的 IPO（上市：资金$10000+估值500）。</p>
              <div><h3 className="font-bold text-amber-400 mb-2 border-b border-stone-800 pb-1">1. 新手起步</h3><ul className="list-disc pl-5 space-y-1 text-stone-400"><li>在【人才市场】招募小弟，在【业务大厅】左侧接取短期项目。</li><li>在【帮派营地】使用放大镜鉴定员工品质，决定其成长上限。</li></ul></div>
              <div><h3 className="font-bold text-amber-400 mb-2 border-b border-stone-800 pb-1">2. 挂机与真实时间收益</h3><ul className="list-disc pl-5 space-y-1 text-stone-400"><li><span className="text-green-400">离线产业分红</span>：只要在基建购买了资产，关闭网页后系统也会按小时为您积攒挂机收益（最高累积24小时）。</li><li><span className="text-cyan-400">长期黑工远征</span>：在【业务大厅】可切换至远征面板。把员工外派后，无视游戏天数，只需挂机等待真实时间即可收获巨额奖励。</li></ul></div>
              <div><h3 className="font-bold text-amber-400 mb-2 border-b border-stone-800 pb-1">3. 风险与破产</h3><ul className="list-disc pl-5 space-y-1 text-stone-400"><li>每天结算会扣除全员<span className="text-red-400">日薪</span>。资金为负即破产。</li><li>资金不足可去借<span className="text-red-500">高利贷</span>。逾期未还会被枪杀得力员工抵债。</li></ul></div>
            </div>
          </div>
        </div>
      )}

      {dailyReport && (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-[85] p-4 animate-fade-in backdrop-blur-sm">
          <div className="bg-[#e8dcc4] text-stone-900 border-8 border-double border-stone-700 rounded-lg max-w-sm w-full p-6 shadow-[0_0_40px_rgba(0,0,0,0.8)] font-mono relative">
            <div className="text-center border-b-2 border-stone-800 pb-4 mb-5">
               <h2 className="text-2xl font-bold uppercase tracking-widest text-stone-900">Western Union</h2>
               <div className="text-xs text-stone-600 mt-1 font-bold">▪ TELEGRAM REPORT ▪</div>
               <div className="text-sm font-bold bg-stone-800 text-[#e8dcc4] inline-block px-3 py-1 mt-2 rounded">第 {dailyReport.day} 天结算明细</div>
            </div>
            
            <div className="space-y-3 text-sm font-bold">
               <div className="flex justify-between border-b border-stone-400 border-dashed pb-1">
                 <span className="text-stone-700">外包项目收入:</span>
                 <span className="text-green-700">+{dailyReport.proj}</span>
               </div>
               <div className="flex justify-between border-b border-stone-400 border-dashed pb-1">
                 <span className="text-stone-700">产业被动分红:</span>
                 <span className="text-green-700">+{dailyReport.asset}</span>
               </div>
               <div className="flex justify-between border-b border-stone-400 border-dashed pb-1">
                 <span className="text-stone-700">员工薪资支出:</span>
                 <span className="text-red-700">-{dailyReport.payroll}</span>
               </div>
               {dailyReport.loan !== 0 && (
                 <div className="flex justify-between border-b border-stone-400 border-dashed pb-1">
                   <span className="text-stone-700">信贷扣款:</span>
                   <span className="text-red-700">{dailyReport.loan}</span>
                 </div>
               )}
               {dailyReport.eventName && (
                 <div className="flex justify-between border-b border-stone-400 border-dashed pb-1">
                   <span className="text-stone-700 overflow-hidden text-ellipsis whitespace-nowrap max-w-[150px]">{dailyReport.eventName}:</span>
                   <span className={dailyReport.eventImpact >= 0 ? "text-green-700" : "text-red-700"}>
                     {dailyReport.eventImpact > 0 ? '+' : ''}{dailyReport.eventImpact}
                   </span>
                 </div>
               )}
            </div>
            
            <div className="mt-5 pt-4 border-t-4 border-stone-800 flex justify-between items-center font-bold text-lg">
               <span>当日净利润:</span>
               <span className={dailyReport.net >= 0 ? "text-green-800" : "text-red-800"}>
                 {dailyReport.net >= 0 ? '+' : ''}{dailyReport.net}
               </span>
            </div>

            <button onClick={() => setDailyReport(null)} className="mt-6 w-full bg-stone-800 hover:bg-stone-700 text-[#e8dcc4] py-3 border-2 border-stone-900 transition uppercase tracking-widest font-bold shadow-md hover:shadow-none active:translate-y-1">
              ▪ 阅毕 (Acknowledge) ▪
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<WildWestStartup />);
    </script>
</body>
</html>
