<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GUI 命名规范交互式参考库，涵盖通用控件组件与游戏系统的命名规则、前缀、后缀词典与校验器。" />
  <title>GUI 命名规范交互版 v2.8</title>
  <style>
    :root{
      --bg:#f4efe6;
      --paper:#fff9ef;
      --paper2:#f7ead8;
      --ink:#2c2117;
      --muted:#7b6651;
      --line:#dfcdb8;
      --brand:#8d4b28;
      --brand2:#b9763b;
      --dark:#2b2119;
      --green:#557a4b;
      --red:#a94a3b;
      --blue:#4c6f8a;
      --gold:#d09a3d;
      --code:#2b2119;
      --codeBg:#f1e5d4;
      --shadow:0 14px 36px rgba(44,33,23,.12);
      --radius:18px;
    }
    *{box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{
      margin:0;
      color:var(--ink);
      background:
        radial-gradient(circle at 18% 0%, rgba(185,118,59,.16), transparent 30%),
        radial-gradient(circle at 92% 8%, rgba(85,122,75,.10), transparent 26%),
        linear-gradient(180deg,#f7f0e6 0%,#eadcc9 100%);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;
      line-height:1.65;
    }
    a{color:inherit;text-decoration:none;}
    .app{display:grid;grid-template-columns:300px minmax(0,1fr);min-height:100vh;}
    aside{
      position:sticky;top:0;height:100vh;overflow:auto;
      border-right:1px solid var(--line);
      background:rgba(255,249,239,.90);backdrop-filter:blur(10px);
      padding:18px 16px 28px;
    }
    .brand{
      border:2px solid rgba(141,75,40,.18);
      background:linear-gradient(145deg,#fff9ef,#f1ddc4);
      border-radius:22px;padding:16px 14px;margin-bottom:14px;box-shadow:var(--shadow);
    }
    .brand h1{margin:0;font-size:22px;line-height:1.2;letter-spacing:.04em;color:var(--brand);}
    .brand p{margin:8px 0 0;color:var(--muted);font-size:12px;}
    .version{display:inline-flex;margin-top:10px;padding:3px 9px;border-radius:999px;background:#2b2119;color:#fff;font-size:11px;}
    .nav-title{margin:18px 0 8px;font-size:12px;color:var(--muted);font-weight:800;letter-spacing:.08em;text-transform:uppercase;}
    .nav-button{
      width:100%;border:1px solid transparent;background:transparent;color:var(--ink);
      border-radius:12px;padding:9px 10px;text-align:left;cursor:pointer;font-weight:700;
      display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px;
    }
    .nav-button:hover{background:#f4e4cf;border-color:#ead1b5;}
    .nav-button:focus-visible{outline:2px solid var(--brand2);outline-offset:2px;}
    .nav-button.active{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 8px 18px rgba(141,75,40,.18);}
    .nav-button .small{font-size:11px;opacity:.78;font-weight:700;white-space:nowrap;}
    .search{width:100%;border:1px solid var(--line);background:#fff9ef;border-radius:13px;padding:10px 12px;color:var(--ink);outline:none;margin:2px 0 8px;}
    .search:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(141,75,40,.12);}
    .search:focus-visible{outline:2px solid var(--brand2);outline-offset:1px;}
    main{padding:24px;min-width:0;scroll-padding-top:18px;}
    #detail{transition:opacity .15s ease;}
    #detail.loading{opacity:.4;}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;
    }
    .mode-tabs{display:flex;gap:8px;flex-wrap:wrap;}
    .mode-btn{
      border:1px solid var(--line);background:rgba(255,249,239,.82);border-radius:999px;padding:10px 14px;cursor:pointer;
      font-weight:800;color:var(--ink);
    }
    .mode-btn.active{background:#2b2119;color:#fff;border-color:#2b2119;}
    .mode-btn:focus-visible,.component-card:focus-visible{outline:2px solid var(--brand2);outline-offset:2px;}
    .hint{color:var(--muted);font-size:13px;}
    .hero{
      background:linear-gradient(135deg,#fff9ef 0%,#f2dec4 100%);
      border:1px solid var(--line);border-radius:26px;padding:24px;box-shadow:var(--shadow);margin-bottom:18px;
    }
    .hero h2{margin:0;font-size:30px;line-height:1.15;color:var(--brand);}
    .hero p{margin:10px 0 0;color:var(--muted);max-width:980px;}
    .meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid #e1c6a6;background:#fff7ea;border-radius:999px;padding:5px 10px;color:#6b4f38;font-size:12px;font-weight:800;}
    .content-grid{display:grid;grid-template-columns:minmax(0,1.15fr) 390px;gap:18px;align-items:start;}
    .card{background:rgba(255,249,239,.92);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:0 10px 28px rgba(44,33,23,.08);margin-bottom:18px;}
    .card h3{margin:0 0 12px;font-size:19px;color:var(--brand);}
    .card h4{margin:16px 0 8px;font-size:15px;color:#5d3b26;}
    .card p{margin:8px 0;color:var(--muted);}
    .rule-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
    .rule-box{border:1px solid #ead1b5;background:#fff8ed;border-radius:14px;padding:12px;}
    .rule-box .label{font-size:12px;color:var(--muted);font-weight:800;margin-bottom:4px;}
    code,.code{
      font-family:Consolas,"SFMono-Regular","Liberation Mono",Menlo,monospace;
      background:var(--codeBg);color:var(--code);border-radius:7px;padding:2px 6px;font-size:.92em;
    }
    pre{margin:0;white-space:pre-wrap;word-break:break-word;background:#2b2119;color:#f7e8d2;border-radius:14px;padding:14px;overflow:auto;font-size:13px;line-height:1.55;}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px;background:#fff8ed;}
    table{width:100%;border-collapse:collapse;min-width:680px;}
    th,td{padding:10px 12px;border-bottom:1px solid #ead6bd;text-align:left;vertical-align:top;}
    th{background:#ead3b6;color:#4a3323;font-size:12px;letter-spacing:.04em;}
    tr:last-child td{border-bottom:none;}
    td{font-size:13px;}
    .phone-card{position:sticky;top:18px;background:rgba(255,249,239,.92);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
    .phone-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .phone-title h3{margin:0;color:var(--brand);font-size:18px;}
    .phone{
      width:100%;max-width:342px;margin:0 auto;border:10px solid #2b2119;border-radius:34px;background:#2b2119;box-shadow:0 18px 38px rgba(44,33,23,.20);overflow:hidden;
    }
    .phone-screen{aspect-ratio:9/20;background:linear-gradient(180deg,#f9ead8,#ecd0aa);padding:10px;display:flex;flex-direction:column;gap:8px;}
    .notch{width:38%;height:15px;background:#2b2119;border-radius:0 0 12px 12px;margin:-10px auto 2px;}
    .ui-region{border:1px solid rgba(141,75,40,.28);background:rgba(255,249,239,.82);border-radius:12px;padding:8px;min-height:38px;position:relative;box-shadow:inset 0 1px 0 rgba(255,255,255,.45);}
    .ui-region strong{display:block;font-size:11px;color:#5b3824;line-height:1.15;margin:0;}
    .ui-region span{display:block;font-size:10px;color:#7b6651;line-height:1.25;font-family:Consolas,"SFMono-Regular",Menlo,monospace;word-break:break-word;}
    .ui-flex{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;}
    .ui-mini{height:42px;border:1px solid #dfcdb8;background:#fff8ed;border-radius:9px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:10px;color:#6f553c;padding:4px;}
    .ui-list{flex:1;display:flex;flex-direction:column;gap:6px;min-height:120px;}
    .ui-list-item{border:1px solid #dfcdb8;background:#fff8ed;border-radius:9px;padding:6px;font-size:10px;color:#6f553c;min-height:32px;}
    .ui-bottom{margin-top:auto;}
    .ui-region.window-head{background:rgba(255,249,239,.92);border-style:solid;}
    .ui-region.tabs{background:rgba(244,228,207,.88);}
    .ui-region.content{background:rgba(255,248,237,.90);border-style:dashed;}
    .ui-region.detail{background:rgba(245,234,218,.92);}
    .ui-region.action{background:rgba(255,244,229,.96);border-style:solid;}
    .ui-region.popup-area{background:rgba(255,249,239,.96);border-style:solid;box-shadow:0 8px 18px rgba(44,33,23,.10);}
    .ui-region.inputbar{background:rgba(255,249,239,.98);border-style:solid;}
    .ui-section-xs{min-height:34px;}
    .ui-section-sm{min-height:46px;}
    .ui-section-md{min-height:66px;}
    .ui-section-lg{min-height:96px;}
    .ui-section-xl{min-height:128px;}
    .ui-section-fill{flex:1;min-height:110px;}
    .ui-section-chat{flex:1.35;min-height:170px;}
    .ui-inline{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
    .ui-token{border:1px solid #dfcdb8;background:#fff8ed;border-radius:999px;padding:3px 6px;font-size:9px;line-height:1.15;color:#6f553c;font-family:Consolas,"SFMono-Regular",Menlo,monospace;}
    .ui-cell-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:5px;margin-top:6px;}
    .ui-cell{height:28px;border:1px solid #dfcdb8;background:#fff8ed;border-radius:7px;font-size:8px;color:#6f553c;display:flex;align-items:center;justify-content:center;text-align:center;padding:2px;}
    .region-head{display:flex;flex-direction:column;gap:3px;}
    .region-head code{display:block;background:rgba(43,33,25,.08);border:1px solid rgba(141,75,40,.16);border-radius:7px;padding:3px 5px;font-size:9px;line-height:1.18;color:#5f4935;word-break:break-word;}
    .v13-stack{display:flex;flex-direction:column;gap:5px;margin-top:7px;}
    .v13-row{border:1px solid #dfcdb8;background:#fff8ed;border-radius:9px;padding:5px 6px;font-size:9px;color:#6f553c;line-height:1.2;min-height:26px;display:flex;align-items:center;}
    .v13-token-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
    .v13-token{border:1px solid #d7b990;background:#fff4e5;border-radius:999px;padding:3px 6px;font-size:8.5px;line-height:1.12;color:#714c2f;font-family:Consolas,"SFMono-Regular",Menlo,monospace;}
    .v13-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:5px;margin-top:7px;}
    .v13-cell{height:28px;border:1px solid #d7b990;background:#fff4e5;border-radius:7px;font-size:7.5px;color:#714c2f;display:flex;align-items:center;justify-content:center;text-align:center;padding:2px;line-height:1.05;overflow:hidden;}
    .prototype-note{font-size:11px;color:#6f553c;margin:8px 0 0;text-align:center;}
    .naming-panel{margin-top:14px;border:1px solid var(--line);border-radius:14px;background:#fff8ed;overflow:hidden;}
    .naming-panel h4{margin:0;padding:9px 11px;background:#ead3b6;color:#4a3323;font-size:13px;}
    .naming-row{display:grid;grid-template-columns:88px minmax(0,1fr);gap:8px;padding:9px 11px;border-top:1px solid #ead6bd;align-items:start;}
    .naming-row strong{font-size:12px;color:#5d3b26;line-height:1.25;}
    .naming-row code{display:inline-block;margin:0 4px 4px 0;font-size:11px;}
    .ui-action-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;}
    .ui-action-btn{border:1px solid #cfa878;background:#fff2dc;border-radius:8px;font-size:9px;color:#6f4428;text-align:center;padding:4px 3px;font-family:Consolas,"SFMono-Regular",Menlo,monospace;}

    .chip-row{display:flex;flex-wrap:wrap;gap:8px;}
    .chip{border:1px solid #e1c6a6;background:#fff7ea;border-radius:999px;padding:5px 9px;font-size:12px;color:#6b4f38;font-weight:800;}
    .component-gallery{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
    .component-card{border:1px solid #e4c9aa;background:#fff8ed;border-radius:15px;padding:12px;cursor:pointer;transition:.16s ease;min-height:104px;}
    .component-card:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(44,33,23,.10);border-color:var(--brand2);}
    .component-card strong{display:block;color:#5d3b26;margin-bottom:6px;}
    .component-card code{display:inline-block;margin-top:6px;}
    .notice{border-left:4px solid var(--brand);background:#fff4e5;border-radius:12px;padding:12px 14px;color:#6a4e37;}
    .bad{border-left-color:var(--red);background:#fff0ee;}
    .good{border-left-color:var(--green);background:#eef6e9;}
    .two-col{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
    .footer{margin-top:24px;color:var(--muted);font-size:12px;text-align:center;}
    .empty{padding:20px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:16px;background:#fff8ed;}
    @media (max-width:1180px){.content-grid{grid-template-columns:1fr}.phone-card{position:static}.phone{max-width:320px}.component-gallery{grid-template-columns:repeat(2,minmax(0,1fr));}}
    @media (max-width:860px){.app{grid-template-columns:1fr;}aside{position:static;height:auto}.topbar{align-items:flex-start;flex-direction:column}.rule-grid,.two-col{grid-template-columns:1fr}.component-gallery{grid-template-columns:1fr}main{padding:16px}.hero h2{font-size:24px}}
    @media print{aside,.topbar,.search{display:none}.app{display:block}main{padding:0}.phone-card{position:static}.card,.hero,.phone-card{box-shadow:none;break-inside:avoid}.content-grid{grid-template-columns:1fr}}

    .showcase-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:12px;}
    .showcase-head h3{margin:0;font-size:28px;line-height:1.2;color:#5b341d;}
    .showcase-head p{margin:8px 0 0;color:#7b6651;font-size:13px;line-height:1.7;}
    .showcase-badge{flex:0 0 auto;border:1px solid #dec2a0;background:#f7e8d4;color:#7a5131;border-radius:8px;padding:4px 9px;font-size:12px;font-weight:800;box-shadow:0 2px 6px rgba(44,33,23,.06);}
    .showcase-subnote{font-size:11px;color:#8a725a;text-align:center;margin-top:10px;}
    .phone-showcase{max-width:312px;padding:8px;border-radius:34px;background:linear-gradient(180deg,#36261b,#241a14);box-shadow:0 18px 36px rgba(44,33,23,.18);}
    .phone-screen-rich{position:relative;overflow:hidden;border-radius:26px;background:linear-gradient(180deg,#f8ecd9 0%, #ead5b5 100%);padding:0;display:flex;flex-direction:column;gap:0;min-height:clamp(480px,80vh,645px);}
    .mock-topbar{position:relative;background:linear-gradient(180deg,#b16d39,#93542c);padding:12px 12px 10px;border-bottom:2px solid rgba(141,75,40,.22);}
    .mock-topbar .mock-title{text-align:center;color:#fff7ec;font-size:20px;font-weight:900;letter-spacing:.05em;line-height:1.1;}
    .mock-topbar .mock-icons{position:absolute;left:10px;right:10px;top:12px;display:flex;justify-content:space-between;align-items:center;}
    .mock-icon{width:24px;height:24px;border-radius:999px;background:#fff4e7;border:1px solid #dec2a0;color:#8d4b28;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;box-shadow:0 2px 4px rgba(44,33,23,.08);}
    .mock-body{flex:1;padding:10px;display:flex;flex-direction:column;gap:8px;overflow:hidden;}
    .mock-card{position:relative;background:#f6ead7;border:1px solid #dcb98f;border-radius:14px;padding:9px 10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.6);}
    .mock-card.flat{background:#f4dfc0;}
    .mock-node-badge{position:absolute;top:6px;right:7px;border:1px solid #dcb98f;background:#fff5e8;border-radius:999px;padding:2px 6px;font-size:8px;line-height:1.15;color:#875836;font-family:Consolas,"SFMono-Regular",Menlo,monospace;max-width:62%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .mock-card-title{font-size:11px;font-weight:900;color:#6b4227;margin-bottom:6px;padding-right:72px;line-height:1.2;}
    .mock-section-title{font-size:11px;font-weight:900;color:#6b4227;margin-bottom:6px;padding-right:72px;line-height:1.2;}
    .strict-table td{font-size:12px;}
    .strict-table code{display:inline-block;margin:0 4px 4px 0;font-size:11px;}
    .strict-badge{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:2px 7px;font-size:11px;font-weight:900;}
    .strict-badge.required{background:#eef6e9;color:#557a4b;border:1px solid #c8dfbd;}
    .strict-badge.optional{background:#fff4e5;color:#8d4b28;border:1px solid #e1c6a6;}
    .strict-badge.forbidden{background:#fff0ee;color:#a94a3b;border:1px solid #efc3bc;}
    .mock-inline{display:flex;gap:6px;align-items:center;}
    .mock-inline.between{justify-content:space-between;}
    .mock-pill{flex:1;height:28px;border:1px solid #d8b58e;background:#fff8ed;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#6c472d;padding:0 8px;}
    .mock-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid #dbbb95;border-radius:11px;overflow:hidden;background:#efe0c7;}
    .mock-tabs.four{grid-template-columns:repeat(4,1fr);} 
    .mock-tab{height:30px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#835534;border-right:1px solid #dbc09b;background:#efdfc4;}
    .mock-tab:last-child{border-right:none;}
    .mock-tab.active{background:#9c5b30;color:#fff6ea;font-weight:900;}
    .mock-list{display:flex;flex-direction:column;gap:8px;}
    .mock-item{background:#fff8ef;border:1px solid #dec3a2;border-radius:12px;padding:8px;display:flex;gap:8px;align-items:center;position:relative;}
    .mock-icon-box{width:28px;height:28px;border-radius:9px;background:linear-gradient(180deg,#efc582,#d6a15c);border:1px solid #c78b42;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#6a3f16;flex:0 0 auto;}
    .mock-lines{flex:1;display:flex;flex-direction:column;gap:6px;}
    .mock-line{height:7px;border-radius:999px;background:#d9b894;}
    .mock-line.short{width:58%;}
    .mock-line.mid{width:80%;}
    .mock-progress{height:9px;border-radius:999px;background:#e7d6bf;border:1px solid #d7b48c;overflow:hidden;}
    .mock-progress > span{display:block;height:100%;background:linear-gradient(90deg,#5b8748,#7dad60);}
    .mock-btn{height:30px;min-width:54px;border-radius:10px;background:linear-gradient(180deg,#ba723c,#9b592f);color:#fff8ed;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 12px;box-shadow:0 2px 6px rgba(157,92,48,.18);}
    .mock-btn.alt{background:linear-gradient(180deg,#cab49a,#b0997e);color:#fffef8;}
    .mock-btn.light{background:linear-gradient(180deg,#fff7eb,#f0dcc1);color:#855631;border:1px solid #d5b590;box-shadow:none;}
    .mock-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
    .mock-grid.two{grid-template-columns:repeat(2,1fr);} 
    .mock-cell{height:58px;border:1px solid #d8b58e;background:#fff7ea;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:4px;position:relative;overflow:hidden;}
    .mock-cell .mini-icon{width:18px;height:18px;border-radius:6px;background:#e8c690;border:1px solid #ca9756;}
    .mock-cell strong{font-size:10px;color:#6f472c;line-height:1;}
    .mock-count{position:absolute;bottom:2px;right:3px;background:#2b2119;color:#fff;border-radius:999px;padding:1px 5px;font-size:8px;line-height:1.1;}
    .mock-detail{display:flex;flex-direction:column;gap:6px;}
    .mock-text-row{display:flex;justify-content:space-between;gap:8px;font-size:11px;color:#6f4b31;}
    .mock-text-row strong{color:#56351f;}
    .mock-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
    .mock-actions.two{grid-template-columns:repeat(2,1fr);} 
    .mock-bottomnav{height:48px;margin-top:auto;background:#564131;color:#fff5eb;border-top:1px solid rgba(255,255,255,.15);display:grid;grid-template-columns:repeat(4,1fr);align-items:center;}
    .mock-bottomnav span{text-align:center;font-size:10px;opacity:.9;}
    .mock-bottomnav span.active{font-weight:900;color:#fff;}
    .mock-map{position:relative;height:230px;border:1px solid #d3af85;background:#dfbf98;border-radius:14px;overflow:hidden;}
    .mock-map-node{position:absolute;width:42px;height:42px;border-radius:999px;border:2px solid #a55d31;background:#fff7ea;color:#7e4d2b;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;}
    .mock-map-node.gray{background:#cfc1af;border-color:#a69482;color:#fff;}
    .mock-map-node.boss{background:#c85e4f;border-color:#8c2d28;color:#fff;}
    .mock-search{display:flex;gap:6px;align-items:center;}

    .mock-reward-glow{height:78px;border-radius:18px;background:radial-gradient(circle at 50% 50%, rgba(255,214,118,.75), rgba(255,214,118,.18) 48%, transparent 72%);display:flex;align-items:center;justify-content:center;margin:4px 0;position:relative;}
    .mock-reward-chest{width:62px;height:48px;border-radius:12px;background:linear-gradient(180deg,#e8b350,#a4632e);border:2px solid #7d4724;box-shadow:0 8px 18px rgba(126,73,31,.24);}

    .mock-reward-cell strong{font-size:10px;color:#6f472c;line-height:1;}
    .mock-quality-frame{position:absolute;inset:4px;border:2px solid rgba(208,154,61,.55);border-radius:10px;pointer-events:none;}


    .validator-panel{display:grid;grid-template-columns:1fr;gap:12px;}
    .validator-input{width:100%;min-height:180px;border:1px solid var(--line);border-radius:14px;background:#fffaf2;color:#2c2117;padding:12px 14px;font-family:Consolas,"SFMono-Regular",Menlo,monospace;font-size:13px;line-height:1.55;resize:vertical;outline:none;}
    .validator-input:focus{border-color:var(--brand2);box-shadow:0 0 0 3px rgba(185,118,59,.14);}
    .validator-actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
    .validator-result{border:1px solid var(--line);border-radius:14px;background:#fff8ed;overflow:hidden;}
    .validator-summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px;}
    .validator-stat{border:1px solid #e1c6a6;background:#fff7ea;border-radius:14px;padding:10px 12px;}
    .validator-stat strong{display:block;font-size:20px;color:#5b351f;line-height:1.1;}
    .validator-stat span{font-size:11px;color:#7b6651;}
    .status-ok{color:#557a4b;font-weight:900;}
    .status-warn{color:#b9763b;font-weight:900;}
    .status-bad{color:#a94a3b;font-weight:900;}
    .quick-table{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
    .quick-card{border:1px solid var(--line);background:#fff8ed;border-radius:16px;padding:12px;}
    .quick-card h4{margin:0 0 8px;font-size:14px;color:#5b351f;}
    .quick-card .tag-list{display:flex;flex-wrap:wrap;gap:6px;}
    .quick-card code{font-size:11px;margin:0;}
    .flow-steps{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;counter-reset:step;}
    .flow-step{position:relative;border:1px solid #e1c6a6;background:#fff7ea;border-radius:15px;padding:14px 12px 12px 38px;min-height:92px;}
    .flow-step:before{counter-increment:step;content:counter(step);position:absolute;left:12px;top:14px;width:18px;height:18px;border-radius:999px;background:#8d4b28;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;}
    .flow-step strong{display:block;color:#5b351f;margin-bottom:4px;}
    .flow-step span{font-size:12px;color:#7b6651;line-height:1.5;}
    @media (max-width:1180px){.validator-summary,.flow-steps{grid-template-columns:repeat(2,minmax(0,1fr));}.quick-table{grid-template-columns:1fr;}}
    @media (max-width:680px){.validator-summary,.flow-steps{grid-template-columns:1fr;}}

  </style>

<script>
const COMMON = [
  {
    id:'titlebar', title:'标题栏组件', alias:'TitleBar', tag:'顶部导航',
    desc:'用于所有窗口顶部区域，统一承载标题、关闭、返回、帮助、页签入口等控件。系统实例只改模块名，不改基础结构。',
    formula:'UI_Common_TitleBar_[Name] / Panel_TitleBar / Txt_Title / Btn_Close / Btn_Back',
    nodes:[['Panel_TitleBar','Panel','标题栏容器，固定在 SafeArea 顶部'],['Img_TitleBg','Image','标题底板或彩带背景'],['Txt_Title','Text','窗口标题文本'],['Btn_Back','Button','返回按钮，可选'],['Btn_Close','Button','关闭按钮，可选'],['Btn_Help','Button','帮助说明按钮，可选']],
    examples:{prefab:['UI_Common_TitleBar_Default','UI_Common_TitleBar_WithBack','UI_Common_TitleBar_WithHelp'],sprite:['spr_common_titlebar_bg','icon_common_close','icon_common_back'],key:['ui.common.title.default','ui.common.btn.close','ui.common.btn.back'],event:['OnClickCommonClose()','OnClickCommonBack()','OnClickCommonHelp()']},
    mock:['Panel_SafeArea','Panel_TitleBar','Txt_Title + Btn_Close + Btn_Back','Panel_Content'],
    checklist:['标题栏组件必须位于 SafeArea 内。','关闭按钮统一命名为 Btn_Close，不使用 Btn_Exit / Btn_X。','系统标题文本使用 ui.[system].title，不直接写死。']
  },
  {
    id:'button', title:'按钮组件', alias:'Button', tag:'操作入口',
    desc:'用于确认、取消、领取、前往、购买、发送、合成、装备等交互动作。按钮命名必须体现动作语义。',
    formula:'Btn_[Action] / UI_Common_Btn_[Style] / Txt_BtnLabel / Icon_Btn',
    nodes:[['Btn_[Action]','Button','动作按钮根节点，如 Btn_Claim'],['Img_BtnBg','Image','按钮背景，可按 Normal/Disabled 切换'],['Txt_BtnLabel','Text','按钮文本'],['Icon_Btn','Image','按钮图标，可选'],['Effect_Click','Effect','点击反馈，可选']],
    examples:{prefab:['UI_Common_Btn_Primary','UI_Common_Btn_Secondary','UI_Common_Btn_Danger'],sprite:['spr_common_btn_primary','spr_common_btn_disabled','icon_common_arrow'],key:['ui.common.btn.confirm','ui.common.btn.cancel','ui.common.btn.go'],event:['OnClickConfirm()','OnClickCancel()','OnClickGo()']},
    mock:['Panel_BottomAction','Btn_Confirm','Txt_BtnLabel','Effect_Click'],
    checklist:['按钮节点禁止命名 Btn_1 / Button / OKButton。','系统按钮必须使用业务动作，如 Btn_ClaimTask、Btn_ForgeStart。','禁用态只改状态后缀，不新建语义不清的按钮名。']
  },
  {
    id:'tab', title:'页签组件', alias:'TabGroup', tag:'分类切换',
    desc:'用于任务类型、背包分类、聊天频道、好友分类、装备部位等列表切换。页签组与页签项分层命名。',
    formula:'Group_Tab_[Name] / Tab_[Category] / Txt_TabName / RedDot_Tab',
    nodes:[['Group_Tab_[Name]','Group','页签组容器'],['Tab_[Category]','Button','单个页签项'],['Img_TabBg','Image','页签背景'],['Txt_TabName','Text','页签名称'],['RedDot_Tab','RedDot','页签红点，可选']],
    examples:{prefab:['UI_Common_TabGroup_Top','UI_Common_TabGroup_Side','UI_Common_TabItem'],sprite:['spr_common_tab_on','spr_common_tab_off','spr_common_tab_side'],key:['ui.common.tab.all','ui.common.tab.daily','ui.common.tab.material'],event:['OnTabChanged(tabId)','OnClickTabDaily()','OnClickTabAll()']},
    mock:['Group_Tab','Tab_All / Tab_Daily / Tab_Achievement','RedDot_Tab','Panel_Content'],
    checklist:['页签组必须使用 Group_Tab_*。','页签项必须用业务分类命名，不使用 Tab_1/Tab_2。','红点挂在页签项下，统一 RedDot_Tab。']
  },
  {
    id:'listitem', title:'列表项组件', alias:'ListItem', tag:'列表/滚动',
    desc:'用于任务条目、好友条目、聊天消息、关卡条目、锻造配方等可重复对象。列表容器与条目 Prefab 必须分离。',
    formula:'Scroll_[Name]List / Content_[Name]List / Item_[Name]',
    nodes:[['Scroll_[Name]List','ScrollView','滚动列表根节点'],['Viewport_[Name]','Viewport','滚动遮罩区域'],['Content_[Name]List','Content','列表内容容器'],['Item_[Name]','Item','单个列表项实例'],['Btn_ItemClick','Button','条目点击热区，可选']],
    examples:{prefab:['UI_Common_Item_ListBase','UI_Task_ItemQuest','UI_Social_ItemFriend'],sprite:['spr_common_list_item_bg','spr_common_list_selected'],key:['ui.common.list.empty','ui.common.list.loading'],event:['OnClickListItem(itemId)','OnListItemSelected(itemId)','RefreshList()']},
    mock:['Scroll_MainList','Viewport_MainList','Content_MainList','Item_Row_001 / Item_Row_002'],
    checklist:['列表容器和列表项不得同名。','动态生成项使用 Item_[业务名]，不要使用 prefab 名作为场景节点。','滚动容器统一 Scroll_ 前缀。']
  },
  {
    id:'slot', title:'格子/槽位组件', alias:'SlotCell', tag:'道具/装备/卡牌',
    desc:'用于背包格子、装备槽、材料槽、奖励格、卡牌槽。格子必须区分 Cell、Slot、Item 三类语义。',
    formula:'Cell_[ItemType] / Slot_[EquipPart] / Icon_Item / Txt_Count / Frame_Quality',
    nodes:[['Cell_[ItemType]','Cell','可重复展示格，如 Cell_ItemMaterial'],['Slot_[EquipPart]','Slot','固定槽位，如 Slot_Weapon'],['Frame_Quality','Image','品质框'],['Icon_Item','Image','物品图标'],['Txt_Count','Text','数量文本'],['Img_Selected','Image','选中态'],['RedDot_Cell','RedDot','可操作红点']],
    examples:{prefab:['UI_Common_Cell_Item','UI_Common_Slot_Equip','UI_Common_Cell_Reward'],sprite:['spr_common_quality_common','spr_common_quality_rare','spr_common_slot_empty'],key:['ui.common.count.owned','ui.common.slot.empty'],event:['OnClickItemCell(itemId)','OnClickEquipSlot(part)','OnCellSelected(id)']},
    mock:['Cell_ItemMaterial','Frame_Quality','Icon_Item','Txt_Count x128','RedDot_Cell'],
    checklist:['Cell 表示列表格，Slot 表示固定槽位，Item 表示业务数据条目。','品质框统一 Frame_Quality。','数量文本统一 Txt_Count，不使用 Txt_Num。']
  },
  {
    id:'reddot', title:'红点/角标组件', alias:'RedDot', tag:'状态提示',
    desc:'用于可领取、可升级、未读、可合成、可锻造等提示。红点命名必须挂在具体宿主下。',
    formula:'RedDot_[Host] / Badge_[Type] / Txt_BadgeNum',
    nodes:[['RedDot_[Host]','RedDot','红点根节点，如 RedDot_TaskClaim'],['Badge_[Type]','Badge','数字角标或状态角标'],['Txt_BadgeNum','Text','角标数字'],['Img_BadgeBg','Image','角标背景']],
    examples:{prefab:['UI_Common_RedDot','UI_Common_Badge_Num','UI_Common_Badge_New'],sprite:['spr_common_reddot','spr_common_badge_num','spr_common_badge_new'],key:['ui.common.badge.new','ui.common.badge.unread'],event:['RefreshRedDot(hostId)','SetBadgeNum(hostId,num)','ClearRedDot(hostId)']},
    mock:['Btn_SystemEntry','RedDot_SystemEntry','Badge_Unread','Txt_BadgeNum'],
    checklist:['红点禁止独立漂浮在窗口根节点下。','未读数用 Badge_Unread，不用 RedDot_Num。','红点逻辑变量应与宿主业务一致。']
  },
  {
    id:'progress', title:'进度条组件', alias:'ProgressBar', tag:'进度/经验',
    desc:'用于任务进度、关卡进度、经验、锻造进度、材料收集进度等。进度条文本、填充、背景必须分层。',
    formula:'Bar_[Name]Progress / Img_BarBg / Img_BarFill / Txt_Progress',
    nodes:[['Bar_[Name]Progress','ProgressBar','进度条根节点'],['Img_BarBg','Image','进度条背景'],['Img_BarFill','Image','进度条填充'],['Txt_Progress','Text','进度文本'],['Effect_Full','Effect','满进度提示，可选']],
    examples:{prefab:['UI_Common_Bar_Progress','UI_Common_Bar_Exp','UI_Common_Bar_Timer'],sprite:['spr_common_bar_bg','spr_common_bar_fill_green','spr_common_bar_fill_gold'],key:['ui.common.progress.format','ui.common.progress.full'],event:['SetProgress(value,max)','OnProgressFull()','RefreshProgressText()']},
    mock:['Bar_TaskProgress','Img_BarBg','Img_BarFill 70%','Txt_Progress 7/10'],
    checklist:['进度条根节点使用 Bar_*Progress。','填充图片统一 Img_BarFill。','文本格式走本地化 Key，不在代码拼死。']
  },
  {
    id:'input', title:'输入框组件', alias:'InputField', tag:'聊天/搜索/命名',
    desc:'用于聊天输入、搜索、玩家改名、群聊命名等输入场景。输入根节点和发送/清除按钮必须分开。',
    formula:'Input_[Name] / Txt_Placeholder / Txt_Input / Btn_Clear / Btn_Send',
    nodes:[['Input_[Name]','InputField','输入框根节点'],['Img_InputBg','Image','输入背景'],['Txt_Placeholder','Text','占位文本'],['Txt_Input','Text','输入内容'],['Btn_Clear','Button','清空按钮，可选'],['Btn_Send','Button','发送按钮，可选']],
    examples:{prefab:['UI_Common_Input_Normal','UI_Common_Input_Search','UI_Common_Input_Chat'],sprite:['spr_common_input_bg','icon_common_search','icon_common_clear'],key:['ui.common.input.placeholder','ui.chat.input.placeholder','ui.social.search.placeholder'],event:['OnInputChanged(text)','OnClickInputClear()','OnClickSend()']},
    mock:['Input_ChatMessage','Txt_Placeholder','Txt_Input','Btn_Send'],
    checklist:['输入框统一 Input_ 前缀。','聊天发送按钮不挂在输入框内部逻辑里，节点可同层。','搜索输入使用 Input_Search，不使用 Txt_Search。']

function pickNodeNames(section){

function initValidator(){

  const clear = document.getElementById('clearNamingCheck');
  const result = document.getElementById('namingCheckResult');
  if(!input || !run || !result) return;
  const sampleText = ['Window_TaskMain','Popup_RewardGet','Panel_RewardContent','Grid_RewardItem','Cell_RewardItem','Slot_CardSource','Slot_CardTarget','Btn_RewardConfirm','spr_reward_popup_bg','icon_bag_material','fx_ui_reward_get_glow','ui.reward.title.get','OnClickRewardConfirm()','Button1','Image_道具','Panel01','Txt_Num','Slot_BagItem','Cell_EquipWeapon','ui_btn_task_claim_normal@center','ui_panel_reward_content@stretchxy','ui_glg_reward_item','ui_btn_ok_normal@center','ui_btn_领取@center','ui_btn_task_claim_can_get@center'].join('\n');
  sample.onclick=()=>{ input.value=sampleText; runCheck(); };

function checkBaum2LayerName(name){
  const baumPrefixes = ['ui_btn_','ui_txt_','ui_img_','ui_icon_','ui_input_','ui_slider_','ui_tog_','ui_drop_','ui_scroll_','ui_tab_','ui_badge_','ui_progress_','ui_check_','ui_radio_','ui_panel_','ui_bg_','ui_mask_','ui_divider_','ui_frame_','ui_card_','ui_popup_','ui_toast_','ui_loading_','ui_item_','ui_header_','ui_footer_','ui_arrow_','ui_close_','ui_handle_','ui_thumb_','ui_glg_','ui_vlg_','ui_hlg_','ui_cg_'];
  const baumParams = ['center','top','bottom','left','right','middle','stretchx','stretchy','stretchxy','rot90','rot-90','flipx','flipy','scale2'];
  const baumStates = ['_normal','_hover','_pressed','_disabled','_selected','_highlighted','_inactive','_empty','_filled','_locked','_completed','_claimed','_new','_claimable','_unread','_insufficient'];
  if(name === '#Canvas') return {name,type:'Baum2 特殊图层',level:'ok',label:'通过',suggestion:'#Canvas 用于定义画布区域。'};
  if(/^#/.test(name)) return {name,type:'Baum2 注释图层',level:'ok',label:'通过',suggestion:'# 开头图层作为注释，不导出。'};
  if(/^\*/.test(name)) return {name,type:'Baum2 栅格化图层',level:'ok',label:'通过',suggestion:'* 开头图层表示需要栅格化。'};
  if(!name.startsWith('ui_')) return null;
  const parts = name.split('@');
  const base = parts.shift();
  const params = parts.filter(Boolean);
  if(!/^[a-z0-9_]+$/.test(base)) return {name,type:'Baum2 PS 图层',level:'bad',label:'错误',suggestion:'PS 图层必须使用小写 snake_case，不能使用中文、大写或空格，例如 ui_btn_task_claim_normal@center。'};
  const badParam = params.find(p=>!baumParams.includes(p));
  if(badParam) return {name,type:'Baum2 PS 图层',level:'warn',label:'警告',suggestion:'发现未登记导出参数 @'+badParam+'。建议只使用 @center、@stretchx、@stretchy、@stretchxy、@rot90、@flipx 等 Baum2 参数。'};
  const prefix = baumPrefixes.find(p=>base.startsWith(p));
  if(!prefix) return {name,type:'Baum2 PS 图层',level:'bad',label:'错误',suggestion:'ui_ 前缀未登记到 Baum2 映射表。请使用 ui_btn_、ui_txt_、ui_img_、ui_icon_、ui_panel_、ui_scroll_、ui_glg_ 等。'};
  let semantic = base.slice(prefix.length);
  const matchedState = baumStates.find(st=>semantic.endsWith(st));
  if(matchedState) semantic = semantic.slice(0, -matchedState.length);
  if(!semantic) return {name,type:'Baum2 PS 图层',level:'bad',label:'错误',suggestion:'缺少业务语义。格式应为 ui_[type]_[system]_[semantic]_[state]@layout。'};
  if(/(^|_)(button|image|text|panel|ok|go|bg|new|temp|copy)(_|$)/.test(semantic) && /ui_(btn|txt|panel|item)_/.test(prefix)){
    return {name,type:'Baum2 PS 图层',level:'warn',label:'警告',suggestion:'Baum2 前缀合法，但语义偏通用。建议补充系统和动作，例如 ui_btn_task_claim_normal@center → Btn_TaskClaim。'};
  }
  const knownBusiness = ['task','bag','level','chat','social','forge','cardmerge','equip','item','material','reward','common'];
  const hasBusiness = knownBusiness.some(x=>semantic.split('_').includes(x) || semantic.includes(x));
  return {name,type:'Baum2 PS 图层',level:hasBusiness?'ok':'warn',label:hasBusiness?'通过':'警告',suggestion:hasBusiness?'PS 图层符合 Baum2 前缀、snake_case、状态和布局参数规则；导入 Unity 后需转换为 PascalCase 业务节点。':'Baum2 前缀合法，但建议补充系统归属，例如 task、bag、reward、common。'};
}

function checkName(name){
  const nodePrefixes = ['Window_','Popup_','Panel_','Group_','Scroll_','Viewport_','Content_','Grid_','Item_','Cell_','Slot_','Btn_','Txt_','Icon_','Img_','Bar_','Input_','RedDot_','Badge_','State_','Mask_','Row_','Avatar_','Toast_','Effect_','Anim_','Tab_','Frame_'];
  const resourcePrefixes = ['spr_','icon_','fx_','anim_','audio_','ui_'];
  const systemAliases = SYSTEMS.map(s=>s.alias);
  const forbidden = [/^Button\d*$/i,/^Image\d*$/i,/^Text\d*$/i,/^Panel\d*$/i,/^New Text$/i,/^GameObject\d*$/i,/^Untitled/i];
  const hasChinese = /[\u4e00-\u9fa5]/.test(name);
  if(forbidden.some(r=>r.test(name))) return {name,type:'默认命名',level:'bad',label:'错误',suggestion:'禁止使用引擎默认名。改为“前缀_系统_语义”，例如 Btn_TaskClaim。'};
  if(hasChinese) return {name,type:'含中文',level:'bad',label:'错误',suggestion:'节点、资源、Key、事件、PS 图层统一使用英文命名；中文只进入本地化文本。'};
  const baum2Result = checkBaum2LayerName(name);
  if(baum2Result) return baum2Result;
  if(/^ui\.[a-z0-9_.-]+$/.test(name)){
    const okSystem = /^ui\.(common|task|bag|level|chat|social|forge|cardmerge|equip|itemmaterial|reward|rewardpopup)(\.|$)/.test(name);
    return {name,type:'本地化 Key',level:okSystem?'ok':'warn',label:okSystem?'通过':'警告',suggestion:okSystem?'Key 符合小写点分隔规则。':'建议使用 ui.[system].[module].[name]，例如 ui.reward.title.get。'};
  }
  if(/^On[A-Z][A-Za-z0-9_]*\(.*\)$/.test(name) || /^(Refresh|Open|Close|Play|Set|Get)[A-Z][A-Za-z0-9_]*\(.*\)$/.test(name)){
    return {name,type:'事件/方法',level:'ok',label:'通过',suggestion:'事件/方法使用 PascalCase 动词结构。'};
  }
  if(resourcePrefixes.some(p=>name.startsWith(p))){
    if(!/^[a-z0-9_]+$/.test(name)) return {name,type:'资源文件',level:'bad',label:'错误',suggestion:'资源文件必须使用 snake_case，例如 spr_reward_popup_bg。'};
    const hasSystem = ['common','task','bag','level','chat','social','forge','cardmerge','equip','item','reward'].some(s=>name.includes('_'+s+'_') || name.startsWith('ui_'+s+'_'));
    return {name,type:'资源文件',level:hasSystem?'ok':'warn',label:hasSystem?'通过':'警告',suggestion:hasSystem?'资源命名符合 snake_case 且包含系统语义。':'建议在资源名中加入系统语义，如 spr_reward_popup_bg。'};
  }
  if(nodePrefixes.some(p=>name.startsWith(p))){
    if(!/^[A-Za-z][A-Za-z0-9_\[\]-]*$/.test(name)) return {name,type:'GUI 节点',level:'bad',label:'错误',suggestion:'GUI 节点只允许英文、数字、下划线和少量模板符号。'};
    if(name.includes('__')) return {name,type:'GUI 节点',level:'warn',label:'警告',suggestion:'避免连续下划线，保持 Type_System_Name_State。'};
    if(/^Txt_Num$/.test(name)) return {name,type:'GUI 节点',level:'warn',label:'警告',suggestion:'数量文本统一使用 Txt_Count 或 Txt_[业务]Count。'};
    if(/^Cell_Equip(Weapon|Armor|Accessory)$/i.test(name)) return {name,type:'GUI 节点',level:'warn',label:'警告',suggestion:'固定装备部位必须使用 Slot_EquipWeapon / Slot_EquipArmor / Slot_EquipAccessory；Cell_EquipItem 只用于装备列表格。'};
    const fixedSlotAllow = /^(Slot_Equip(Weapon|Armor|Accessory)|Slot_Forge(Target|Material)|Slot_Card(Source|Target)|Slot_MaterialNeed|Slot_Target)$/;
    if(fixedSlotAllow.test(name)) return {name,type:'GUI 节点',level:'ok',label:'通过',suggestion:'Slot 用于固定槽位，该命名符合固定槽位规则。'};
    if(/^Slot_(Bag|Item|Reward|CardMaterial|MaterialItem)/.test(name)) return {name,type:'GUI 节点',level:'warn',label:'警告',suggestion:'列表/网格中的可重复格子应使用 Cell_ 前缀；Slot 仅用于固定槽位，例如 Slot_EquipWeapon、Slot_CardSource。'};
    const hasSystem = systemAliases.some(alias=>name.includes(alias)) || name.includes('Common') || name.includes('Reward');
    return {name,type:'GUI 节点',level:hasSystem?'ok':'warn',label:hasSystem?'通过':'警告',suggestion:hasSystem?'节点前缀合法且包含业务语义。':'前缀合法，但建议补充系统或业务语义，例如 Btn_RewardConfirm。'};
  }
  if(/^UI_[A-Za-z0-9_]+$/.test(name)) return {name,type:'Prefab / View',level:'ok',label:'通过',suggestion:'Prefab 使用 UI_[System]_[Name] 结构。'};
  return {name,type:'未知',level:'warn',label:'警告',suggestion:'未识别到标准前缀。请按 Window_ / Popup_ / Btn_ / spr_ / ui. / OnClick 等规则重命名。'};
}

document.addEventListener('click', e=>{
  const reuse = e.target.closest('[data-reuse-id]');
  if(reuse) select('common',reuse.dataset.reuseId);
});
search.addEventListener('input', debounce(e=>{ searchText=e.target.value.trim(); renderNav(); }, 250));

function debounce(fn,ms){ let t; return (...args)=>{ clearTimeout(t); t=setTimeout(()=>fn(...args),ms); }; }
document.querySelectorAll('.mode-btn[data-jump]').forEach(btn=>{
  btn.onclick=()=>{
    const j=btn.dataset.jump;
    if(j==='overview') select('overview', lastOverviewId);
    if(j==='common') select('common','titlebar');
    if(j==='systems') select('system','task');
    if(j==='baum2') select('overview','baum2');
    if(j==='validator') select('overview','validator');
  };
});
renderNav();
renderDetail();
</script>
