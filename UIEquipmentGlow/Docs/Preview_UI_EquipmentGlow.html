<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UI Equipment Glow Preview</title>
<style>
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#211713; font-family:Arial, sans-serif; color:#f7e5c0; }
  .wrap { display:grid; grid-template-columns:repeat(5, 150px); gap:28px; }
  .cell { position:relative; width:150px; height:150px; border-radius:28px; display:flex; align-items:center; justify-content:center; background:linear-gradient(145deg,#4c3324,#2c1f1a); box-shadow:inset 0 0 18px rgba(0,0,0,.55); overflow:visible; }
  .cell:before { content:""; position:absolute; inset:-12px; border-radius:34px; opacity:var(--glow-alpha); box-shadow:0 0 var(--glow-size) var(--color), inset 0 0 18px var(--color); animation:pulse 1.4s ease-in-out infinite; }
  .frame { position:absolute; inset:8px; border:10px solid var(--color); border-radius:26px; box-shadow:inset 0 0 0 3px rgba(255,255,255,.35); overflow:hidden; }
  .shine { position:absolute; top:-40%; left:-80%; width:80%; height:180%; transform:rotate(35deg); background:linear-gradient(90deg,transparent,rgba(255,255,255,.85),transparent); animation:shine 1.8s linear infinite; opacity:var(--shine); }
  .icon { width:74px; height:74px; border-radius:18px; background:linear-gradient(145deg,#d3a45d,#865c2e); box-shadow:inset 0 0 18px rgba(255,255,255,.25); }
  .name { position:absolute; bottom:-28px; width:100%; text-align:center; font-size:14px; }
  @keyframes pulse { 0%,100%{ transform:scale(1); opacity:calc(var(--glow-alpha) * .55); } 50%{ transform:scale(1.035); opacity:var(--glow-alpha); } }
  @keyframes shine { from{ left:-90%; } to{ left:120%; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="cell" style="--color:#b4b4b4;--glow-alpha:0;--glow-size:0px;--shine:0"><div class="frame"></div><div class="icon"></div><div class="name">Normal</div></div>
    <div class="cell" style="--color:#3aa7ff;--glow-alpha:.55;--glow-size:18px;--shine:0"><div class="frame"></div><div class="icon"></div><div class="name">Rare</div></div>
    <div class="cell" style="--color:#b45cff;--glow-alpha:.75;--glow-size:24px;--shine:0"><div class="frame"></div><div class="icon"></div><div class="name">Epic</div></div>
    <div class="cell" style="--color:#ff9d28;--glow-alpha:.95;--glow-size:32px;--shine:1"><div class="frame"><div class="shine"></div></div><div class="icon"></div><div class="name">Legendary</div></div>
    <div class="cell" style="--color:#ff3d3d;--glow-alpha:1;--glow-size:42px;--shine:1"><div class="frame"><div class="shine"></div></div><div class="icon"></div><div class="name">Mythic</div></div>
  </div>
</body>
</html>
